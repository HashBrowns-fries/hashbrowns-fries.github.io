<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Chenhao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F9F7F2; --bg-2: #F3F0E8; --bg-3: #EDE9DF; --surface: #FDFCFA;
      --text: #1C1C18; --muted: #7A7870; --dim: #B4B0A8;
      --border: rgba(28,28,24,0.10); --accent: #2C3E50; --accent-2: #8B6D4A;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Lora', Georgia, serif; --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 1rem; line-height: 1.85; }
    ::selection { background: var(--text); color: var(--bg); }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.6rem 5vw;
      background: rgba(249,247,242,0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-family: var(--font-display); font-size: 1.1rem; font-weight: 400; color: var(--text); }
    .nav-brand em { font-style: italic; color: var(--muted); }
    .nav-links { display: flex; gap: 3rem; list-style: none; }
    .nav-links a { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; color: var(--muted); transition: color 0.3s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); }

    .blog-header {
      max-width: 760px;
      margin: 0 auto;
      padding: 8rem 5vw 4rem;
    }
    .blog-back {
      font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--dim); text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
      margin-bottom: 3rem; transition: color 0.3s;
    }
    .blog-back:hover { color: var(--text); }
    .blog-meta {
      font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 1rem;
    }
    .blog-title {
      font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300; line-height: 1.1; letter-spacing: -0.01em; color: var(--text); margin-bottom: 2rem;
    }
    .blog-title em { font-style: italic; font-weight: 300; color: var(--muted); }
    .blog-divider { width: 32px; height: 1px; background: var(--text); margin: 2rem 0; }

    .blog-content {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 5vw 6rem;
    }
    .blog-content p { margin-bottom: 1.8rem; font-size: 1.05rem; color: var(--muted); line-height: 1.9; }
    .blog-content p:first-of-type { font-size: 1.15rem; color: var(--text); }
    .blog-content h2 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 400; color: var(--text); margin: 3rem 0 1.2rem; }
    .blog-content code { font-family: var(--font-mono); font-size: 0.85em; background: var(--bg-2); padding: 0.15em 0.4em; border-radius: 2px; }
    .blog-content pre { background: var(--bg-3); padding: 1.5rem; overflow-x: auto; margin: 1.5rem 0; }
    .blog-content pre code { background: none; padding: 0; }
    .blog-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .blog-tag { font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.6rem; border: 1px solid var(--border); color: var(--dim); }

    footer { padding: 3rem 5vw; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; color: var(--dim); }
    .footer-links { display: flex; gap: 2.5rem; }
    .footer-links a { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); text-decoration: none; transition: color 0.3s; }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 640px) {
      nav .nav-links { gap: 1.5rem; }
      footer { flex-direction: column; gap: 1.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">Chen<em>hao</em></div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/#publications">Publications</a></li>
      <li><a href="#" class="active">Blog</a></li>
    </ul>
  </nav>

  <div class="blog-header">
    <a href="/#blog" class="blog-back">← Back to Blog</a>
    <div class="blog-meta">2025 · · · min read</div>
    <h1 class="blog-title">Post Title</h1>
    <div class="blog-divider"></div>
  </div>

  <article class="blog-content">
    <p>First paragraph — lead-in sentence that draws the reader in.</p>
    <p>Body paragraph with main content...</p>

    <div class="blog-tags">
      <span class="blog-tag">LLM</span>
    </div>
  </article>

  <footer>
    <div class="footer-copy">© 2025 Chenhao</div>
    <div class="footer-links">
      <a href="https://github.com/HashBrowns-fries" target="_blank">GitHub</a>
    </div>
  </footer>

</body>
</html>
