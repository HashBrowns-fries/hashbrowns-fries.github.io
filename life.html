<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — Chenhao Meng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F9F7F2; --bg-2: #F3F0E8; --bg-3: #EDE9DF; --surface: #FDFCFA;
      --text: #1C1C18; --muted: #7A7870; --dim: #B4B0A8;
      --border: rgba(28,28,24,0.10); --accent-2: #8B6D4A;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Lora', Georgia, serif; --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 1rem; line-height: 1.85; }
    ::selection { background: var(--text); color: var(--bg); }
    a { text-decoration: none; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.6rem 5vw;
      background: rgba(249,247,242,0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-family: var(--font-display); font-size: 1.1rem; font-weight: 400; color: var(--text); }
    .nav-brand em { font-style: italic; color: var(--muted); }
    .nav-links { display: flex; gap: 3rem; list-style: none; }
    .nav-links a { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; color: var(--muted); transition: color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 8rem 5vw 6rem;
    }
    .page-eyebrow {
      font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 1.2rem;
    }
    .page-title {
      font-family: var(--font-display); font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 300; line-height: 1.1; letter-spacing: -0.01em;
      margin-bottom: 4rem; color: var(--text);
    }
    .page-title em { font-style: italic; font-weight: 300; color: var(--muted); }

    .entry-item {
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: padding-left 0.3s;
    }
    .entry-item:first-of-type { border-top: 1px solid var(--border); }
    .entry-item:hover { padding-left: 0.75rem; }
    .entry-meta {
      font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 0.6rem;
    }
    .entry-title {
      font-family: var(--font-display); font-size: 1.4rem; font-weight: 400;
      color: var(--text); margin-bottom: 0.6rem; line-height: 1.35;
      transition: color 0.3s;
    }
    .entry-item:hover .entry-title { color: var(--accent-2); }
    .entry-excerpt { font-size: 0.88rem; color: var(--muted); line-height: 1.8; }
    .entry-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.8rem; }
    .entry-tag {
      font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.2rem 0.5rem;
      border: 1px solid var(--border); color: var(--dim);
    }

    .placeholder {
      padding: 4rem 0; font-family: var(--font-mono); font-size: 0.6rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
    }

    footer { padding: 3rem 5vw; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; color: var(--dim); }
    .footer-links { display: flex; gap: 2.5rem; }
    .footer-links a { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); text-decoration: none; transition: color 0.3s; }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 640px) {
      nav .nav-links { gap: 1.5rem; }
      footer { flex-direction: column; gap: 1.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">Chenhao <em>Meng</em></div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/#publications">Publications</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/life.html" class="active">Life</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="page-eyebrow">Notes</div>
    <h1 class="page-title">Notes &amp; <em>Life</em></h1>

    <div class="placeholder">// Notes — 待填入内容</div>
  </div>

  <footer>
    <div class="footer-copy">© 2025 Chenhao Meng</div>
    <div class="footer-links">
      <a href="https://github.com/HashBrowns-fries" target="_blank">GitHub</a>
    </div>
  </footer>

</body>
</html>
